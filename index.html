    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Georgia', 'Times New Roman', serif;
            background: radial-gradient(ellipse at center, #0d3d24 0%, #061a10 70%, #000000 100%);
            color: #f5e9c8;
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        /* Subtle felt texture using layered gradients */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255,215,120,0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,215,120,0.04) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 640px;
            width: 100%;
            text-align: center;
            padding: 48px 32px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(212,175,55,0.15);
        }

        .badge {
            display: inline-block;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4af37;
            padding: 8px 18px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            border-radius: 999px;
            margin-bottom: 32px;
        }

        h1 {
            font-size: clamp(28px, 5vw, 44px);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
            color: #f5e9c8;
            text-shadow: 0 2px 20px rgba(212, 175, 55, 0.25);
        }

        h1 .accent {
            color: #d4af37;
            font-style: italic;
        }

        .description {
            font-size: 17px;
            line-height: 1.7;
            color: rgba(245, 233, 200, 0.85);
            margin-bottom: 40px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta {
            display: inline-block;
            padding: 18px 44px;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            color: #0d1f10;
            background: linear-gradient(135deg, #f4d160 0%, #d4af37 50%, #a67c00 100%);
            border: 1px solid #d4af37;
            border-radius: 6px;
            box-shadow:
                0 8px 24px rgba(212, 175, 55, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow:
                0 12px 32px rgba(212, 175, 55, 0.55),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .cta:active {
            transform: translateY(0);
        }

        .features {
            margin-top: 40px;
            padding-top: 28px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(245, 233, 200, 0.7);
            line-height: 1.8;
        }

        .features .suit {
            color: #d4af37;
            margin: 0 4px;
        }

        .suit.red {
            color: #c92a2a;
        }

        .footer-link {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(245, 233, 200, 0.4);
            text-decoration: none;
            z-index: 2;
        }

        .footer-link:hover {
            color: rgba(212, 175, 55, 0.8);
        }

        @media (max-width: 480px) {
            .container {
                padding: 36px 22px;
            }

            .cta {
                padding: 16px 32px;
                font-size: 15px;
                letter-spacing: 1px;
            }

            .features {
                font-size: 12px;
                letter-spacing: 1.5px;
            }
        }
